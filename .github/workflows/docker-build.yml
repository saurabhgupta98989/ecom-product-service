name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build Jar
        run: mvn clean package -DskipTests

      # ✅ Extract version from pom.xml
      - name: Get version from pom.xml
        id: get_version
        run: echo "VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> $GITHUB_ENV

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ✅ Build image with version + latest
      - name: Build Docker Image
        run: |
          echo "Building version: $VERSION"
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/ecom-product-service:$VERSION \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/ecom-product-service:latest \
            .

      # ✅ Push both tags
      - name: Push Docker Images
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/ecom-product-service:$VERSION
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/ecom-product-service:latest

      - name: Clone Helm Repo
        run: |
          git clone https://${{ secrets.HELM_REPO_TOKEN }}@github.com/saurabhgupta98989/ecom-helm-chart.git
          cd ecom-helm-chart
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Install yq
        run: sudo snap install yq

      - name: Update Helm values.yaml
        run: |
          cd ecom-helm-chart
          echo "Updating image tag to $VERSION"
          yq -i '.ecom-product-service.image.tag = strenv(VERSION)' values.yaml

      - name: Commit and Push changes
        run: |
          cd ecom-helm-chart
          git add values.yaml
          git commit -m "Update product-service image tag to $VERSION" || echo "No changes to commit"
          git push
